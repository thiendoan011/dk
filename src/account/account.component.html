<div
    class="m-grid m-grid--hor m-grid--root m-page">
    <div class="m-grid__item m-grid__item--fluid m-grid m-grid--ver-desktop m-grid--desktop m-grid--tablet-and-mobile m-grid--hor-tablet-and-mobile m-login m-login--1 m-login--signin"
        id="m_login">
        <div
            class="m-grid__item m-grid__item--order-tablet-and-mobile-2 m-login__aside">
            <div
                class="m-stack m-stack--hor m-stack--desktop">
                <div
                    class="m-stack__item m-stack__item--fluid">
                    <div
                        class="m-login__wrapper">
                        <div
                            class="m-login__logo">
                            <a
                                href="#">
                                <img [style.height]="'90px'"
                                    [src]="logoLogin">
                            </a>
                        </div>
                        <router-outlet></router-outlet>
                    </div>
                </div>
                <div
                    class="m-stack__item m-stack__item--center">
                    <div
                        class="m-login__account">
                        <span
                            class="m-login__account-msg">
                            {{currentYear}}
                            &copy;
                            &nbsp;
                            gAMSPro
                            <span
                                class="d-none d-sm-inline">
                                -
                                {{
                                'GlobalBankingManageSystem'
                                |
                                localize
                                }}</span>.
                        </span>&nbsp;&nbsp;
                    </div>
                    <div
                        class="m-login__account">
                        <span
                            class="m-login__account-msg">
                            <tenant-change></tenant-change>
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <div class="m-grid__item m-grid__item--fluid m-grid m-grid--center m-grid--hor m-grid__item--order-tablet-and-mobile-1 m-login__content m-grid-item--center"
            style="background-image: url(assets/logo/background-login.jpg)">
            <div
                class="m-grid__item m-grid__item--middle">
                <h3
                    class="m-login__welcome">
                    {{
                    'WelcomeToGSOFTgAMSPro'
                    |
                    localize
                    }}
                </h3>
                <p
                    class="m-login__msg">
                    {{
                    'GSOFTgAMSProDescription'
                    |
                    localize
                    }}
                </p>
            </div>
        </div>
    </div>
</div>
@if
(multiTenancy.isEnabled)
{
<div
    class="language-switch-area">
    <language-switch></language-switch>
</div>
}
