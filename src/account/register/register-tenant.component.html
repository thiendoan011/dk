<div class="m-login__signin"
    [@routerTransition]>
    <div
        class="m-login__head">
        <h3
            class="m-login__title">
            {{
            'TenantSignUp'
            |
            localize
            }}
        </h3>
        <div
            class="m-login__desc">
            {{
            'TenantSignUpDetail'
            |
            localize
            }}
        </div>
    </div>
    <form
        #registerTenantForm="ngForm"
        class="m-login__form m-form"
        method="post"
        novalidate
        (ngSubmit)="save()">
        <div
            class="form-group m-form__group">
            <input
                class="form-control placeholder-no-fix"
                type="text"
                placeholder="{{'TenancyName' | localize}}"
                name="tenancyName"
                [(ngModel)]="model.tenancyName"
                required
                maxlength="64" />
        </div>
        <div
            class="form-group m-form__group">
            <input
                class="form-control placeholder-no-fix"
                type="text"
                placeholder="{{'Name' | localize}}"
                name="name"
                [(ngModel)]="model.name"
                required
                maxlength="128" />
        </div>
        <div
            class="form-group m-form__group">
            <input
                class="form-control placeholder-no-fix"
                type="email"
                placeholder="{{'AdminEmailAddress' | localize}}"
                name="adminEmailAddress"
                [(ngModel)]="model.adminEmailAddress"
                required
                maxlength="256" />
        </div>
        <div
            class="form-group m-form__group">
            <input
                class="form-control placeholder-no-fix"
                type="password"
                placeholder="{{'AdminPassword' | localize}}"
                name="adminPassword"
                [(ngModel)]="model.adminPassword"
                required
                maxlength="32" />
        </div>
        @if
        (useCaptcha)
        {
        <div
            class="form-group m-form__group">
            <re-captcha
                #recaptchaRef
                (resolved)="captchaResolved($event)"
                [siteKey]="recaptchaSiteKey"></re-captcha>
        </div>
        }
        <div
            class="m-login__form-action">
            <button
                [disabled]="saving() || !registerTenantForm.form.valid"
                type="submit"
                class="btn btn-primary m-btn m-btn--pill m-btn--custom m-btn--air m-login__btn m-login__btn--primary">
                {{
                'Submit'
                |
                localize
                }}
            </button>
            <button
                [disabled]="saving()"
                routerLink="/account/login"
                type="button"
                class="btn btn-outline-primary m-btn m-btn--pill m-btn--custom m-login__btn">
                {{
                'Cancel'
                |
                localize
                }}
            </button>
        </div>
    </form>
</div>
