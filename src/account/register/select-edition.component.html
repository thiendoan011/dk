<div class="pricing-content-1"
    [@routerTransition]>
    @if
    (editionsSelectOutput.editionsWithFeatures)
    {
    <div
        class="row">
        @for
        (editionWithFeatures
        of
        editionsSelectOutput.editionsWithFeatures;
        track
        editionWithFeatures.edition.id)
        {
        <div
            class="col-md-4">
            <h4>{{editionWithFeatures.edition.displayName}}
            </h4>
        </div>
        }
    </div>
    }
</div>
