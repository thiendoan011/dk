<div class="m-login__signin"
    [@routerTransition]>
    <div
        class="m-login__head">
        <h3
            class="m-login__title">
            {{
            'VerifySecurityCode'
            |
            localize
            }}
        </h3>
    </div>
    <form
        #validateTwoFactorCodeForm="ngForm"
        class="m-login__form m-form"
        method="post"
        novalidate
        (ngSubmit)="submit()">
        <div
            class="form-group m-form__group">
            <input
                class="form-control placeholder-no-fix"
                type="text"
                autocomplete="off"
                placeholder="{{'Code' | localize}}"
                name="code"
                [(ngModel)]="code"
                required
                maxlength="16" />
        </div>
        <div
            class="m-login__form-action">
            <button
                [disabled]="submit()"
                type="submit"
                class="btn btn-primary m-btn m-btn--pill m-btn--custom m-btn--air m-login__btn m-login__btn--primary">
                {{
                'Submit'
                |
                localize
                }}
            </button>
            <button
                [disabled]="submit()"
                routerLink="/account/login"
                type="button"
                class="btn btn-outline-primary m-btn m-btn--pill m-btn--custom m-login__btn">
                {{
                'Cancel'
                |
                localize
                }}
            </button>
        </div>
    </form>
</div>
