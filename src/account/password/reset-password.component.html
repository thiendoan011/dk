<div class="m-login__signin"
    [@routerTransition]>
    <div
        class="m-login__head">
        <h3
            class="m-login__title">
            {{
            'ChangePassword'
            |
            localize
            }}
        </h3>
    </div>
    <form
        #resetPassForm="ngForm"
        class="m-login__form m-form"
        method="post"
        novalidate
        (ngSubmit)="save()">
        <p>
            {{
            'PleaseEnterYourNewPassword'
            |
            localize
            }}
        </p>
        <div
            class="form-group m-form__group">
            <input
                type="password"
                name="Password"
                class="form-control placeholder-no-fix"
                [(ngModel)]="model.password"
                #Password="ngModel"
                placeholder="{{'Password' | localize}}"
                validateEqual="PasswordRepeat"
                reverse="true"
                [required]="true"
                maxlength="32">
        </div>
        <div
            class="form-group m-form__group">
            <input
                type="password"
                name="PasswordRepeat"
                class="form-control placeholder-no-fix"
                [ngModel]="model.passwordRepeat"
                #PasswordRepeat="ngModel"
                placeholder="{{'PasswordRepeat' | localize}}"
                validateEqual="Password"
                [required]="true"
                maxlength="32">
        </div>
        <div [hidden]="resetPassForm.form.valid || resetPassForm.form.pristine"
            class="form-group">
            <ul class="help-block text-danger"
                *ngIf="PasswordRepeat.errors && PasswordRepeat.errors['validateEqual']">
                <li>{{'PasswordsDontMatch'
                    |
                    localize}}
                </li>
            </ul>
        </div>
        <div
            class="m-login__form-action">
            <button
                [disabled]="saving() || !resetPassForm.form.valid"
                type="submit"
                class="btn btn-primary m-btn m-btn--pill m-btn--custom m-btn--air m-login__btn m-login__btn--primary">
                {{
                'Submit'
                |
                localize
                }}
            </button>
        </div>
    </form>
</div>
