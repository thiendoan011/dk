<footer
    class="m-grid__item m-footer">
    <div
        class="m-container {{ui.getContainerClass()}} m-container--full-height m-page__container">
        @if
        (useWrapperDiv)
        {
        <div
            class="m-footer__wrapper">
            <div
                class="m-stack m-stack--flex-tablet-and-mobile m-stack--ver m-stack--desktop">
                <div
                    class="m-stack__item m-stack__item--left m-stack__item--middle m-stack__item--last">
                    <span
                        class="m-footer__copyright">
                        gAMSPro
                        v.3.0.{{releaseDate}}
                        ©
                        Copyright
                    </span>
                    <span
                        class="m-footer__copyright">
                        <a> -
                        </a>
                        <a (click)='termsOfUse()'
                            style="cursor: pointer; color: rgb(0 141 241);">Terms
                            of
                            use</a>
                    </span>
                </div>
            </div>
        </div>
        }
        @else
        {
        <div
            class="m-stack m-stack--flex-tablet-and-mobile m-stack--ver m-stack--desktop">
            <div
                class="m-stack__item m-stack__item--left m-stack__item--middle m-stack__item--last">
                <span
                    class="m-footer__copyright">
                    DungKhanh
                    v.1.0.{{releaseDate}}
                    ©
                    Copyright
                </span>
            </div>
        </div>
        }
    </div>
</footer>
