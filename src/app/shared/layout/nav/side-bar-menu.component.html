<div id="m_ver_menu"
    class="m-aside-menu"
    data-menu-vertical="true"
    data-menu-scrollable="true"
    data-menu-dropdown-timeout="500">
    <ul
        class="m-menu__nav m-menu__nav--dropdown-submenu-arrow">
        @if
        (menu)
        {
        @for
        (item
        of
        menu.items;
        track
        item.name)
        {
        @if
        (showMenuItem(item))
        {
        <app-menu-list
            [item]="item"></app-menu-list>
        }
        }
        }
    </ul>
</div>
