<div bsModal
    #modal="bs-modal"
    class="modal fade"
    tabindex="-1"
    role="dialog"
    aria-labelledby="modal"
    aria-hidden="true"
    [config]="{backdrop: 'static'}">
    <div
        class="modal-dialog modal-lg">
        <div
            class="modal-content">
            @if
            (active)
            {
            <form
                #changeProfilePictureForm="ngForm"
                (ngSubmit)="save()">
                <div
                    class="modal-header">
                    <h5
                        class="modal-title">
                        <span>{{l("ChangeProfilePicture")}}</span>
                    </h5>
                    <button
                        type="button"
                        class="close"
                        (click)="close()"
                        [attr.aria-label]="l('Close')">
                        <span
                            aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div
                    class="modal-body">
                    <div
                        class="form-group">
                        <input
                            type="file"
                            (change)="fileChangeEvent($event)" />
                    </div>
                    <div
                        class="row">
                        <div
                            class="col-md-12">
                            <image-cropper
                                [imageChangedEvent]="imageChangedEvent"
                                [maintainAspectRatio]="true"
                                [aspectRatio]="1 / 1"
                                [resizeToWidth]="128"
                                format="png"
                                (imageCropped)="imageCropped($event)">
                            </image-cropper>
                        </div>
                    </div>
                </div>
                <div
                    class="modal-footer">
                    <button
                        [disabled]="saving"
                        type="button"
                        class="btn btn-secondary"
                        (click)="close()">{{l("Cancel")}}</button>
                    <button
                        type="submit"
                        class="btn btn-primary"
                        [disabled]="!changeProfilePictureForm.form.valid || saving">
                        <i
                            class="fa fa-save"></i>
                        <span>{{l("Save")}}</span>
                    </button>
                </div>
            </form>
            }
        </div>
    </div>
</div>
