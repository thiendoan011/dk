<div bsModal
    #linkAccountModal="bs-modal"
    (onShown)="onShown()"
    class="modal fade"
    tabindex="-1"
    role="dialog"
    aria-labelledby="createOrEditModal"
    aria-hidden="true"
    [config]="{backdrop: 'static'}">
    <div
        class="modal-dialog">
        <div
            class="modal-content">
            @if
            (active)
            {
            <form
                #linkAccountForm="ngForm"
                novalidate
                (ngSubmit)="save()">
                <div
                    class="modal-header">
                    <h5
                        class="modal-title">
                        <span>{{l("LinkNewAccount")}}</span>
                    </h5>
                    <button
                        type="button"
                        class="close"
                        (click)="close()"
                        [attr.aria-label]="l('Close')">
                        <span
                            aria-hidden="true">&times;</span>
                    </button>
                </div>
                <div
                    class="modal-body">
                    <div
                        class="form-group">
                        <label
                            for="TenancyName">{{l("TenancyName")}}</label>
                        <input
                            id="TenancyName"
                            type="text"
                            name="TenancyName"
                            class="form-control"
                            [(ngModel)]="linkUser.tenancyName">
                    </div>
                    <div
                        class="form-group">
                        <label
                            for="UsernameOrEmailAddress">{{l("UserName")}}
                            *</label>
                        <input
                            id="UsernameOrEmailAddress"
                            type="text"
                            name="UsernameOrEmailAddress"
                            class="form-control"
                            [(ngModel)]="linkUser.usernameOrEmailAddress"
                            required>
                    </div>
                    <div
                        class="form-group">
                        <label
                            for="Password">{{l("Password")}}
                            *</label>
                        <input
                            id="Password"
                            #passwordInput="ngModel"
                            type="password"
                            name="Password"
                            class="form-control"
                            [(ngModel)]="linkUser.password"
                            required
                            maxlength="128"
                            [ngClass]="{'edited': linkUser.password}">
                        <validation-messages
                            [formCtrl]="passwordInput"></validation-messages>
                    </div>
                </div>
                <div
                    class="modal-footer">
                    <button
                        [disabled]="saving"
                        type="button"
                        class="btn btn-secondary"
                        (click)="close()">
                        <i
                            class="fa fa-ban"></i>{{l("Cancel")}}
                    </button>
                    <button
                        type="submit"
                        class="btn btn-primary"
                        [disabled]="!linkAccountForm.form.valid"
                        [buttonBusy]="saving"
                        [busyText]="l('SavingWithThreeDot')">
                        <i
                            class="fa fa-save"></i>
                        <span>{{l("Save")}}</span>
                    </button>
                </div>
            </form>
            }
        </div>
    </div>
</div>
