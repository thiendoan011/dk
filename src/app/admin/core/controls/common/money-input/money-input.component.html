<!-- #control [cleave]="{ numeral: true, numeralThousandsGroupStyle: 'thousand', numeralDecimalScale: 3 }" -->
<input
    [maxlength]="maxlength"
    class="{{inputCss}}"
    [disabled]="disabled"
    type="text"
    [ngModel]="_ngModel"
    (keypress)="onKeyPress($event)"
    (focusout)="onFocusOut($event)"
    #control>
